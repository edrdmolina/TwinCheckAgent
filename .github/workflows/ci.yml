name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore TwinCheckAgent.sln

      - name: Build core
        run: dotnet build src/TwinCheck.Agent.Core/TwinCheck.Agent.Core.csproj --configuration Release --no-restore --nologo

      - name: Build API
        run: dotnet build src/TwinCheck.Agent.Api/TwinCheck.Agent.Api.csproj --configuration Release --no-restore --nologo

      - name: Build GUI
        run: dotnet build src/TwinCheck.Agent.Gui/TwinCheck.Agent.Gui.csproj --configuration Release --no-restore --nologo

      - name: Build tests
        run: dotnet build tests/TwinCheck.Agent.Tests/TwinCheck.Agent.Tests.csproj --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test tests/TwinCheck.Agent.Tests/TwinCheck.Agent.Tests.csproj --configuration Release --no-build --nologo --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: tests/TwinCheck.Agent.Tests/TestResults/*.trx
          if-no-files-found: ignore
